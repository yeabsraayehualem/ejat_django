<!DOCTYPE html>
<html>
<head>
    <title>Upload CSV</title>
</head>
<body>

<h2>Upload CSV</h2>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Upload</button>
</form>

<h3>Data:</h3>
<ul>
    {% for row in data %}
        <li>{{ row }}</li>
    {% endfor %}
</ul>

</body>
</html>
